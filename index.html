<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aya AI</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a0e1a, #12172b);
      color: #e0e0ff;
      height: 100vh;
      overflow: hidden;
      position: relative;
      touch-action: pan-y;
    }

    .glow-border {
      position: absolute;
      inset: 0;
      pointer-events: none;
      border: 1.5px solid transparent;
      border-radius: 16px;
      background: linear-gradient(45deg, #00d4ff, #a855f7, #00d4ff) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      mask-composite: exclude;
      animation: glowRotate 12s linear infinite;
      opacity: 0.5;
    }
    @keyframes glowRotate {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    #logo-bg {
      position: absolute;
      inset: 0;
      background: url('https://i.ibb.co/zhFfTbdc/file-00000000b190720884f01820b61847f7.png') center/contain no-repeat;
      opacity: 0;
      pointer-events: none;
      transition: opacity 2s ease;
      z-index: -1;
      background-size: 70%;
    }
    #main.new-chat #logo-bg { opacity: 0.45; }

    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      padding: 0 20px;
      background: rgba(20,25,45,0.75);
      backdrop-filter: blur(16px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #menu-btn { font-size: 30px; cursor: pointer; color: #00d4ff; }
    #title { font-size: 24px; font-weight: 700; color: #00d4ff; text-shadow: 0 0 10px #00d4ff; }

    #sidebar {
      position: fixed;
      top: 0; left: -320px; bottom: 0;
      width: 320px;
      background: rgba(15,20,40,0.96);
      backdrop-filter: blur(14px);
      transition: left 0.4s ease;
      z-index: 200;
      padding: 70px 24px 24px;
      overflow-y: auto;
    }
    #sidebar.open { left: 0; }

    .menu-header { font-size: 18px; color: #00d4ff; margin-bottom: 20px; }

    .menu-item {
      padding: 16px 20px;
      margin: 12px 0;
      background: rgba(255,255,255,0.05);
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .menu-item:hover { background: rgba(0,212,255,0.15); transform: translateX(8px); }

    #profile-pic {
      width: 48px; height: 48px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #00d4ff;
      box-shadow: 0 0 12px rgba(0,212,255,0.4);
    }

    #main {
      height: 100vh;
      padding: 70px 20px 110px;
      overflow-y: scroll;  /* স্ক্রল চালু করা হলো */
      position: relative;
      -webkit-overflow-scrolling: touch;  /* মোবাইলে স্মুথ স্ক্রল */
    }

    .msg {
      margin: 18px 0;
      padding: 16px 20px;
      border-radius: 22px;
      max-width: 82%;
      opacity: 0.9;
      backdrop-filter: blur(8px);
      font-size: 15.5px;
      line-height: 1.45;
    }
    .msg.user {
      background: rgba(0, 212, 255, 0.18);
      color: #f0f8ff;
      margin-left: auto;
      border: 1px solid rgba(0,212,255,0.35);
    }
    .msg.ai {
      background: rgba(140, 100, 220, 0.18);
      color: #f0e8ff;
      border: 1px solid rgba(168, 85, 247, 0.3);
    }

    #input-area {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 18px 20px;
      background: rgba(10,15,35,0.85);
      backdrop-filter: blur(16px);
      display: flex;
      gap: 14px;
      z-index: 90;
    }
    #user-input {
      flex: 1;
      padding: 16px 22px;
      border-radius: 32px;
      border: 1px solid rgba(0,212,255,0.3);
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 16px;
    }
    #send-btn {
      background: linear-gradient(45deg, #00d4ff, #a855f7);
      color: #000;
      border: none;
      border-radius: 50%;
      width: 56px; height: 56px;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 0 18px rgba(0,212,255,0.5);
    }

    #login-prompt {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 300;
    }
    #login-box {
      background: rgba(20,25,50,0.96);
      padding: 44px 32px;
      border-radius: 24px;
      text-align: center;
      max-width: 90%;
      border: 1px solid rgba(0,212,255,0.35);
    }
    #google-btn {
      background: #4285F4;
      color: white;
      border: none;
      padding: 16px 36px;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      margin-top: 24px;
    }
  </style>
</head>
<body>

<div class="glow-border"></div>
<div id="logo-bg"></div>

<div id="header">
  <div id="menu-btn" onclick="toggleMenu()">☰</div>
  <div id="title">Aya AI</div>
</div>

<div id="sidebar">
  <div class="menu-header">Menu</div>
  <div class="menu-item" id="profile-item">
    <img id="profile-pic" src="" alt="Profile" style="display:none;">
    Profile
  </div>
  <div class="menu-item" onclick="newChat()">New Chat</div>
  <h4 style="margin:28px 0 14px; color:#00d4ff;">Chat History</h4>
  <div id="history"></div>
  <div class="menu-item" id="logout" onclick="signOut()" style="display:none">Log Out</div>
</div>

<div id="main">
  <div id="messages"></div>
</div>

<div id="input-area">
  <input id="user-input" placeholder="Ask anything..." autocomplete="off"/>
  <button id="send-btn">↑</button>
</div>

<div id="login-prompt">
  <div id="login-box">
    <h2>Please Login to Chat</h2>
    <p>To continue, sign in with Google</p>
    <button id="google-btn" onclick="signInWithGoogle()">Login with Google</button>
    <button onclick="document.getElementById('login-prompt').style.display='none'" style="margin-top:20px;background:none;border:none;color:#aaa;cursor:pointer;">Cancel</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD2uydEiOBzxV5D7LFY2EWE6TiqHKCBCeg",
    authDomain: "sayatstudio-191251251.firebaseapp.com",
    databaseURL: "https://sayatstudio-191251251-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "sayatstudio-191251251",
    storageBucket: "sayatstudio-191251251.firebasestorage.app",
    messagingSenderId: "846650166489",
    appId: "1:846650166489:web:e352ea6ce43b902b6102c8",
    measurementId: "G-9DL5CQ4VXZ"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  let currentUser = null;
  let currentChatId = localStorage.getItem('currentChatId') || 'chat-' + Date.now();
  let chats = JSON.parse(localStorage.getItem('chats')) || {};

  onAuthStateChanged(auth, user => {
    currentUser = user;
    if (user) {
      document.getElementById('logout').style.display = 'block';
      document.getElementById('profile-item').innerHTML = `
        <img id="profile-pic" src="${user.photoURL || 'https://via.placeholder.com/48'}" alt="Profile">
        ${user.displayName || 'Profile'}
      `;
      loadHistory();
      loadChat(currentChatId);
    } else {
      document.getElementById('logout').style.display = 'none';
      document.getElementById('profile-item').innerHTML = 'Profile';
    }
  });

  window.signInWithGoogle = () => signInWithPopup(auth, provider).catch(e => alert("Login failed: " + e.message));
  window.signOut = () => signOut(auth).catch(e => alert("Logout failed: " + e.message));

  window.toggleMenu = () => {
    document.getElementById('sidebar').classList.toggle('open');
  };

  // সোয়াইপ করে মেনু বন্ধ
  let touchStartX = 0;
  document.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
  }, { passive: true });

  document.addEventListener('touchend', e => {
    const touchEndX = e.changedTouches[0].clientX;
    const diff = touchStartX - touchEndX;
    if (diff > 80 && document.getElementById('sidebar').classList.contains('open')) {
      toggleMenu();
    }
  }, { passive: true });

  window.newChat = () => {
    document.getElementById('main').classList.add('new-chat');
    setTimeout(() => document.getElementById('main').classList.remove('new-chat'), 5000);
    currentChatId = 'chat-' + Date.now();
    localStorage.setItem('currentChatId', currentChatId);
    chats[currentChatId] = {title: 'New Chat', messages: []};
    document.getElementById('messages').innerHTML = '';
    saveChats();
    toggleMenu();
  };

  function loadHistory() {
    const hist = document.getElementById('history');
    hist.innerHTML = '';
    Object.keys(chats).forEach(id => {
      const div = document.createElement('div');
      div.className = 'menu-item';
      div.textContent = chats[id].title || 'Chat ' + id.slice(-6);
      div.onclick = () => loadChat(id);
      hist.appendChild(div);
    });
  }

  function loadChat(id) {
    currentChatId = id;
    localStorage.setItem('currentChatId', id);
    const msgs = document.getElementById('messages');
    msgs.innerHTML = '';
    (chats[id]?.messages || []).forEach(m => addMsg(m.role, m.content));
    toggleMenu();
  }

  function saveChats() {
    localStorage.setItem('chats', JSON.stringify(chats));
    loadHistory();
  }

  function addMsg(role, content) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.textContent = content;
    document.getElementById('messages').appendChild(div);
    div.scrollIntoView({behavior:'smooth'});
  }

  document.getElementById('send-btn').onclick = async () => {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text) return;

    if (!currentUser) {
      document.getElementById('login-prompt').style.display = 'flex';
      return;
    }

    addMsg('user', text);
    input.value = '';

    if (!chats[currentChatId]) chats[currentChatId] = {title: text.slice(0,30), messages:[]};
    chats[currentChatId].messages.push({role:'user', content:text});
    saveChats();

    try {
      const res = await fetch('/.netlify/functions/openai-proxy', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({messages: [{role:'user', content:text}]})
      });

      if (!res.ok) throw new Error('API error');
      const data = await res.json();
      const reply = data.choices[0].message.content;

      addMsg('ai', reply);
      chats[currentChatId].messages.push({role:'ai', content:reply});
      saveChats();
    } catch (err) {
      addMsg('ai', 'Sorry, something went wrong...');
      console.error(err);
    }
  };
</script>
</body>
</html>
